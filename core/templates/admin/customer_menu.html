<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Item - dineQR Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full text-center">
            <div class="text-5xl mb-4">⚠️</div>
            <h2 class="text-2xl font-bold text-slate-900">Delete Item?</h2>
            <p class="text-slate-600 mt-2">
                Are you sure you want to delete <strong>{{ item.name }}</strong>? This cannot be undone.
            </p>
            <form method="POST" class="flex gap-3 mt-6">
                {% csrf_token %}
                <button type="submit"
                    class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 rounded-lg transition">
                    Yes, Delete
                </button>
                <a href="{% url 'menu_management' %}"
                    class="flex-1 text-center bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-2 rounded-lg transition">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</body>
</html>
