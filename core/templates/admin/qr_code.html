<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - dineQR Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <h1 class="text-2xl font-bold text-slate-900">dineQR Admin</h1>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-slate-600">{{ user.username }}</span>
                    <a href="{% url 'admin_logout' %}" class="text-blue-600 hover:text-blue-700 text-sm font-medium">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <nav class="space-y-2 bg-white rounded-lg shadow-sm p-4">
                    <a href="{% url 'admin_dashboard' %}" class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-100">Dashboard</a>
                    <a href="{% url 'orders_view' %}" class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-100">Orders</a>
                    <a href="{% url 'menu_management' %}" class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-100">Menu Items</a>
                    <a href="{% url 'analytics_view' %}" class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-100">Analytics</a>
                    <a href="{% url 'qr_code_view' %}" class="block px-4 py-2 rounded-lg bg-blue-100 text-blue-700 font-medium">QR Code</a>
                </nav>
            </div>
            <div class="lg:col-span-3">
                <h2 class="text-2xl font-bold text-slate-900 mb-6">Restaurant QR Code</h2>
                <div class="bg-white rounded-lg shadow-sm p-8 text-center">
                    <img src="data:image/png;base64,{{ qr_image }}" alt="QR Code" class="mx-auto w-64 h-64">
                    <p class="text-slate-600 mt-4 text-sm">Scan to open menu</p>
                    <div class="mt-4 bg-slate-50 rounded-lg p-3">
                        <p class="text-xs text-slate-500 break-all">{{ menu_url }}</p>
                    </div>
                    <a href="data:image/png;base64,{{ qr_image }}" download="dineQR-menu-qr.png"
                        class="mt-6 inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition">
                        Download QR Code
                    </a>
                    <p class="text-slate-500 text-xs mt-4">Print this and place it on every table</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
