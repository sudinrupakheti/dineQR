{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineQR</title>

    <!-- TAILWIND CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- LUCIDE ICONS CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- LINK TO CART.JS -->
    <script src="{% static 'js/cart.js' %}" defer></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">

            <!-- Logo: Links back to menu and keeps table number -->
            <a href="{% url 'menu' %}{% if request.GET.table %}?table={{ request.GET.table }}{% endif %}"
               class="text-2xl font-bold text-orange-600 hover:text-orange-700 transition-colors flex items-center gap-2">
                <i data-lucide="utensils-crosses" class="w-6 h-6"></i>
                <span>DineQR</span>
            </a>

            <div class="flex items-center gap-4">
                <!-- Cart Icon -->
                <a href="{% url 'cart_detail' %}{% if request.GET.table %}?table={{ request.GET.table }}{% endif %}"
                   class="relative p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors">
                    <i data-lucide="shopping-cart" class="w-6 h-6 text-gray-700"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">
                        0
                    </span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
