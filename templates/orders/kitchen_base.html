<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS | DineQR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl font-black text-orange-600 tracking-tight flex items-center gap-2 uppercase">
                    <i data-lucide="utensils-crosses"></i> Kitchen
                </span>
            </div>

            <div class="flex items-center">
                <span id="system-clock" class="text-xl font-mono font-bold text-gray-700 bg-gray-100 px-4 py-1 rounded-md"></span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
        setInterval(() => {
            document.getElementById('system-clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);
    </script>
</body>
</html>
