{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DineQR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl border border-gray-200/80 shadow-sm p-8 animate-in fade-in duration-500">
        <div class="text-center mb-8">
            <div class="bg-orange-600 text-white p-3 rounded-2xl shadow-sm inline-block mb-3">
                <i data-lucide="lock" class="w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-serif font-bold text-gray-900 tracking-tight">
                dineQR <span class="text-orange-600 font-sans text-sm tracking-normal ml-0.5">Portal</span>
            </h1>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Authorized Access Only</p>
        </div>

        {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                    <div class="bg-red-50 text-red-600 border border-red-200 text-xs font-medium px-4 py-3 rounded-xl flex items-center gap-2">
                        <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Username</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                    <input type="text" name="username" required placeholder="Enter username"
                           class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none text-sm transition-all font-medium placeholder:text-gray-300">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Password</label>
                <div class="relative">
                    <i data-lucide="key-round" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                    <input type="password" name="password" required placeholder="Enter password"
                           class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none text-sm transition-all font-medium placeholder:text-gray-300">
                </div>
            </div>

            <button type="submit" class="w-full mt-2 bg-gray-900 hover:bg-orange-600 text-white font-bold text-[10px] uppercase tracking-widest py-3.5 rounded-xl transition-all shadow-sm flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-4 h-4"></i> Sign In
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
