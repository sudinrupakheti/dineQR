{% load tz %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS Hub | DineQR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .order-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes border-flash {
            0%, 100% { border-color: #ef4444; box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.2); }
            50% { border-color: #b91c1c; box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1); }
        }
        .urgent-card {
            animation: border-flash 2s infinite;
            background-color: #fef2f2 !important;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script>
        // Execution safety patch: Avoids structural layout flickering during page refreshes
        (function() {
            const currentNotice = "{{ broadcast_message|escapejs }}";
            if (currentNotice && localStorage.getItem('kds_dismissed_notice') === currentNotice) {
                document.documentElement.classList.add('hide-broadcast-initially');
            }
        })();
    </script>
    <style>
        .hide-broadcast-initially #broadcast-banner { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans antialiased selection:bg-orange-500 selection:text-white">

    <!-- Toast Notification Container Workspace Layer -->
    <div id="kds-toast-container" class="fixed top-20 right-6 z-[100] flex flex-col gap-3 pointer-events-none w-80"></div>

    <!-- Main Navigation Bar Platform -->
    <nav class="bg-slate-900 text-white sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1800px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-orange-500 text-white p-2 rounded-lg flex items-center justify-center">
                    <i data-lucide="chef-hat" class="w-5 h-5 stroke-[2]"></i>
                </div>
                <div class="flex items-baseline gap-1.5">
                    <span class="text-xl font-serif font-bold tracking-tight flex items-center gap-2">dineQR</span>
                </div>
            </div>

            <!-- Global Station Commands -->
            <div class="flex items-center gap-4">
                <button onclick="executeWaiterSummon('KITCHEN','')" class="bg-slate-800 hover:bg-slate-700 border border-slate-700/80 text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-2 transition-all active:scale-95 text-slate-200">
                    <i data-lucide="bell" class="w-3.5 h-3.5 text-orange-400"></i>
                    Call Waiter
                </button>

                <div class="flex items-center gap-2.5 bg-slate-800/60 px-3 py-1.5 rounded-lg border border-slate-700/50">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-xs font-medium font-mono tracking-wide text-slate-300" id="system-clock">00:00:00</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Permanent Broadcast Notice Layer -->
    {% if broadcast_message %}
    <div id="broadcast-banner" class="bg-amber-500 text-slate-950 px-6 py-2.5 border-b border-amber-600 flex items-center justify-between transition-all duration-300 transform origin-top">
        <div class="flex items-center gap-3 min-w-0">
            <div class="bg-slate-950/10 p-1 rounded-md shrink-0">
                <i data-lucide="megaphone" class="w-4 h-4 text-slate-950 stroke-[2.5]"></i>
            </div>
            <p class="text-xs font-bold tracking-wide uppercase shrink-0">Notice:</p>
            <p class="text-sm font-medium truncate text-slate-900">{{ broadcast_message }}</p>
        </div>
        <button onclick="dismissBroadcast()" class="p-1 hover:bg-slate-950/10 rounded-md transition-colors text-slate-950" title="Dismiss Message">
            <i data-lucide="x" class="w-4 h-4 stroke-[2.5]"></i>
        </button>
    </div>
    {% endif %}

    <!-- Hidden standard hidden forms to acquire core Django context protections -->
    <div class="hidden">{% csrf_token %}</div>
    <audio id="order-chime" src="https://assets.mixkit.co/active_storage/sfx/1390/1390-preview.mp3" preload="auto"></audio>

    <!-- Master Grid Container Workspace -->


    <!-- Operating System Control Diagnostics -->
    <script>
        const CURRENT_NOTICE_TEXT = "{{ broadcast_message|escapejs }}";

        // --- 1. PERSISTENT NOTICE SYSTEM ---
        function dismissBroadcast() {
            const banner = document.getElementById('broadcast-banner');
            if (banner) {
                if (CURRENT_NOTICE_TEXT) {
                    localStorage.setItem('kds_dismissed_notice', CURRENT_NOTICE_TEXT);
                }
                banner.style.height = '0px';
                banner.style.paddingTop = '0px';
                banner.style.paddingBottom = '0px';
                banner.style.opacity = '0';
                setTimeout(() => banner.remove(), 250);
            }
        }

        if (CURRENT_NOTICE_TEXT && localStorage.getItem('kds_dismissed_notice') === CURRENT_NOTICE_TEXT) {
            document.getElementById('broadcast-banner')?.remove();
        }

        // --- 2. RESTAURANT INTER-DEPARTMENTAL CALL WAITER PIPELINE ---
        function executeWaiterSummon(tableNumber, reasonCode = "help") {
            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value;

            fetch('/api/call-waiter/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({
                    table_number: tableNumber, // Sends 'KITCHEN' (or change to '0' if your model is an IntegerField)
                    reason: reasonCode
                })
            })
            .then(async response => {
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.message || 'Transmission failed.');
                }

                // Context-aware success notification alert
                const alertMsg = (tableNumber === 'KITCHEN' || tableNumber === '0')
                    ? "Summons broadcasted: Waiter called to Kitchen!"
                    : `Waiter dispatched to Table ${tableNumber}`;

                showKitchenToast(alertMsg, 'success');
            })
            .catch(error => {
                showKitchenToast(error.message, 'error');
            });
        }

        // Global Summon Controls
        function openGlobalSummonModal() {
            const modal = document.getElementById('global-summon-modal');
            const box = document.getElementById('summon-modal-box');
            modal.classList.replace('hidden', 'flex');
            setTimeout(() => box.classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeGlobalSummonModal() {
            const modal = document.getElementById('global-summon-modal');
            const box = document.getElementById('summon-modal-box');
            box.classList.replace('scale-100', 'scale-95');
            setTimeout(() => modal.classList.replace('flex', 'hidden'), 150);
        }

        function submitGlobalSummon() {
            const tableVal = document.getElementById('summon-table-input').value.trim();
            const reasonVal = document.getElementById('summon-reason-input').value;

            if (!tableVal) {
                showKitchenToast("Please input a valid table identifier", "error");
                return;
            }

            executeWaiterSummon(tableVal, reasonVal);
            closeGlobalSummonModal();
            document.getElementById('summon-table-input').value = '';
        }

        // Minimalist Dynamic Dashboard System Toast UI Notifications
        function showKitchenToast(message, type = 'success') {
            const container = document.getElementById('kds-toast-container');
            if (!container) return;

            const el = document.createElement('div');
            el.className = `p-3 text-xs font-bold rounded-lg border shadow-lg flex items-center gap-2 transition-all duration-300 transform translate-x-12 opacity-0 pointer-events-auto ${
                type === 'success' ? 'bg-slate-900 border-slate-800 text-white' : 'bg-red-50 border-red-200 text-red-700'
            }`;

            const icon = type === 'success' ? 'check-circle-2' : 'alert-triangle';
            el.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 shrink-0"></i> <span>${message}</span>`;

            container.appendChild(el);
            lucide.createIcons();

            setTimeout(() => {
                el.classList.replace('translate-x-12', 'translate-x-0');
                el.classList.replace('opacity-0', 'opacity-100');
            }, 10);

            setTimeout(() => {
                el.classList.replace('translate-x-0', 'translate-x-12');
                el.classList.replace('opacity-100', 'opacity-0');
                setTimeout(() => el.remove(), 300);
            }, 4000);
        }

        // --- 3. ALLERGY SCANNERS & TIMERS CONTROL PIPELINE ---
        function runAllergyAnalysis() {
            document.querySelectorAll('.item-note-wrapper').forEach(wrapper => {
                const rawText = wrapper.getAttribute('data-note-text').toLowerCase();
                if (rawText.includes('allergy') || rawText.includes('allergic') || rawText.includes('no ') || rawText.includes('without')) {
                    const txt = wrapper.querySelector('p').innerText;
                    wrapper.innerHTML = `
                        <div class="p-2 bg-red-600 border border-red-700 text-white rounded-md flex items-start gap-1.5 shadow-2xs animate-pulse">
                            <i data-lucide="shield-alert" class="w-3.5 h-3.5 text-white shrink-0 mt-0.5"></i>
                            <p class="text-xs font-bold leading-normal tracking-wide uppercase">${txt}</p>
                        </div>
                    `;
                }
            });
        }

        function updateTimers() {
            document.querySelectorAll('.order-card').forEach(card => {
                const createdTime = new Date(card.dataset.created);
                const now = new Date();
                const diffMs = now - createdTime;
                const diffMins = Math.floor(diffMs / 60000);

                const timerEl = card.querySelector('.wait-timer');
                if (timerEl) {
                    timerEl.innerText = `${diffMins}m`;
                    if (diffMins >= 15) {
                        card.classList.add('urgent-card');
                        timerEl.classList.replace('text-slate-700', 'text-red-600');
                    }
                }
            });
        }

        // Initialization Run
        runAllergyAnalysis();
        updateTimers();
        setInterval(updateTimers, 60000);

        // Automated Background Page Synchronization (15s)
        setTimeout(() => { location.reload(); }, 15000);

        setInterval(() => {
            const clockEl = document.getElementById('system-clock');
            if (clockEl) clockEl.innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        lucide.createIcons();
    </script>
</body>
</html>
