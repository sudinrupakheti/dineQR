<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management | DineQR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="{% url 'management_dashboard' %}" class="text-xl font-black text-gray-900 tracking-tight flex items-center gap-2">
                    <div class="bg-orange-600 text-white p-1.5 rounded-lg">
                        <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                    </div>
                    <span>DineQR <span class="text-orange-600">Staff</span></span>
                </a>

                <div class="hidden lg:flex gap-1">
                    <a href="{% url 'management_dashboard' %}" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold {% if request.resolver_match.url_name == 'management_dashboard' %} bg-orange-50 text-orange-600 {% else %} text-gray-500 hover:bg-gray-50 {% endif %} transition-all">
                        <i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard
                    </a>
                    <a href="{% url 'kitchen_dashboard' %}" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold text-gray-500 hover:bg-gray-50 transition-all">
                        <i data-lucide="chef-hat" class="w-4 h-4"></i> Kitchen
                    </a>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden md:flex flex-col items-end mr-2">
                    <span id="system-date" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"></span>
                    <span id="system-clock" class="text-sm font-black text-gray-700 font-mono"></span>
                </div>
                <a href="{% url 'admin:index' %}" class="p-2.5 bg-gray-100 text-gray-500 rounded-xl hover:bg-gray-200 transition-all">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hidden audio for Waiter Calls -->
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
        function updateClock() {
            const now = new Date();
            document.getElementById('system-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('system-date').innerText = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
