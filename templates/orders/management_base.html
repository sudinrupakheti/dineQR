<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management | DineQR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <span class="text-2xl font-black text-orange-600 tracking-tight flex items-center gap-2">
                    <i data-lucide="bar-chart-3"></i> DineQR Owner
                </span>

                <div class="hidden md:flex gap-6 border-l border-gray-200 pl-6">
                    <a href="{% url 'management_dashboard' %}" class="flex items-center gap-2 text-sm font-bold text-gray-600 hover:text-orange-600">
                        <i data-lucide="layout-grid" class="w-4 h-4"></i> Operations
                    </a>
                    <a href="{% url 'kitchen_dashboard' %}" class="flex items-center gap-2 text-sm font-bold text-gray-600 hover:text-orange-600">
                        <i data-lucide="chef-hat" class="w-4 h-4"></i> Live Kitchen
                    </a>
                    <a href="{% url 'admin:index' %}" class="flex items-center gap-2 text-sm font-bold text-gray-600 hover:text-orange-600">
                        <i data-lucide="settings" class="w-4 h-4"></i> Admin Panel
                    </a>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <span id="system-clock" class="text-sm font-mono font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-md"></span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
        setInterval(() => {
            document.getElementById('system-clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
