{% extends 'orders/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto py-6 pb-20">

    <!-- Header -->
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i data-lucide="star" class="w-8 h-8 text-yellow-500 fill-yellow-500"></i>
        </div>
        <h1 class="text-3xl font-black text-gray-900 mb-2 tracking-tight">How was your meal?</h1>
        <p class="text-gray-500 font-medium">Table {{ order.table_number }}</p>
    </div>

    <form method="POST" id="review-form" class="space-y-6">
        {% csrf_token %}

        {% for item in order.items.all %}
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100">
            <h3 class="font-black text-lg text-gray-900 mb-4 text-center">{{ item.menu_item.name }}</h3>

            <!-- Star Rating System -->
            <div class="flex justify-center gap-2 mb-6 flex-row-reverse" id="star-group-{{ item.id }}">
                <!-- Notice the flex-row-reverse: This allows CSS peer to color all preceding stars! -->

                <input type="radio" name="rating_{{ item.id }}" id="star5_{{ item.id }}" value="5" class="hidden peer" required>
                <label for="star5_{{ item.id }}" class="cursor-pointer text-gray-300 peer-checked:text-yellow-400 hover:text-yellow-400 peer-hover:text-yellow-400 transition-colors">
                    <i data-lucide="star" class="w-8 h-8 fill-current"></i>
                </label>

                <input type="radio" name="rating_{{ item.id }}" id="star4_{{ item.id }}" value="4" class="hidden peer">
                <label for="star4_{{ item.id }}" class="cursor-pointer text-gray-300 peer-checked:text-yellow-400 hover:text-yellow-400 peer-hover:text-yellow-400 transition-colors">
                    <i data-lucide="star" class="w-8 h-8 fill-current"></i>
                </label>

                <input type="radio" name="rating_{{ item.id }}" id="star3_{{ item.id }}" value="3" class="hidden peer" checked>
                <label for="star3_{{ item.id }}" class="cursor-pointer text-gray-300 peer-checked:text-yellow-400 hover:text-yellow-400 peer-hover:text-yellow-400 transition-colors">
                    <i data-lucide="star" class="w-8 h-8 fill-current"></i>
                </label>

                <input type="radio" name="rating_{{ item.id }}" id="star2_{{ item.id }}" value="2" class="hidden peer">
                <label for="star2_{{ item.id }}" class="cursor-pointer text-gray-300 peer-checked:text-yellow-400 hover:text-yellow-400 peer-hover:text-yellow-400 transition-colors">
                    <i data-lucide="star" class="w-8 h-8 fill-current"></i>
                </label>

                <input type="radio" name="rating_{{ item.id }}" id="star1_{{ item.id }}" value="1" class="hidden peer">
                <label for="star1_{{ item.id }}" class="cursor-pointer text-gray-300 peer-checked:text-yellow-400 hover:text-yellow-400 peer-hover:text-yellow-400 transition-colors">
                    <i data-lucide="star" class="w-8 h-8 fill-current"></i>
                </label>
            </div>

            <!-- Review Text Area -->
            <textarea
                name="comment_{{ item.id }}"
                placeholder="What did you love? Any feedback?"
                class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm focus:ring-2 focus:ring-orange-500 focus:bg-white outline-none transition-all resize-none h-24 font-medium"
            ></textarea>
        </div>
        {% endfor %}

        <div class="pt-4">
            <button type="submit" class="w-full bg-gray-900 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-orange-600 transition-all active:scale-95 flex items-center justify-center gap-2 text-lg">
                Submit Reviews <i data-lucide="check-circle" class="w-5 h-5"></i>
            </button>
        </div>
    </form>
</div>

<script>
    // Just a safety check to make sure icons work
    document.addEventListener("DOMContentLoaded", function () {
        lucide.createIcons();
    });
</script>

<style>
    /* Magic CSS that makes the stars color from left to right */
    #review-form label:hover ~ label { color: #facc15; }
    #review-form input:checked ~ label { color: #facc15; }
</style>
{% endblock %}
