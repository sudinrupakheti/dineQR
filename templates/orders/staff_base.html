<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineQR Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <!-- Unified Staff Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <span class="text-2xl font-black text-orange-600 tracking-tight flex items-center gap-2">
                    <i data-lucide="layout-dashboard"></i> DineQR Staff
                </span>

                <div class="hidden md:flex gap-6 border-l border-gray-200 pl-6">
                    {% if user.is_superuser or user.groups.all.0.name == 'Owner' %}
                        <a href="{% url 'owner_dashboard' %}" class="text-sm font-bold text-gray-600 hover:text-orange-600">Owner Analytics</a>
                    {% endif %}

                    {% if user.is_superuser or user.groups.all.0.name == 'Staff' %}
                        <a href="{% url 'kitchen_dashboard' %}" class="text-sm font-bold text-gray-600 hover:text-orange-600">Kitchen Feed</a>
                    {% endif %}
                </div>
            </div>

            <div class="flex items-center gap-4">
                <span id="system-clock" class="text-sm font-mono font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-md"></span>
            </div>
        </div>
    </nav>

</body>
</html>
