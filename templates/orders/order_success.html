{% extends 'orders/base.html' %}

{% block content %}
<div class="max-w-md mx-auto text-center py-12">
    <div class="bg-white p-8 rounded-2xl shadow-lg border border-green-100">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="check-circle" class="w-12 h-12"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Order Received!</h1>
        <p class="text-gray-500 mb-6">Order #{{ order.id }} is being prepared for Table {{ order.table_number }}</p>

        <div class="bg-gray-50 rounded-lg p-4 mb-8">
            <div class="flex justify-between text-sm mb-2">
                <span class="text-gray-500">Total Bill</span>
                <span class="font-bold text-gray-900 text-lg">Rs. {{ order.total_price }}</span>
            </div>
        </div>

        <a href="{% url 'menu' %}?table={{ order.table_number }}"
            class="inline-block bg-orange-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-orange-700 transition-colors">
            Order More
        </a>
    </div>
</div>
{% endblock %}
