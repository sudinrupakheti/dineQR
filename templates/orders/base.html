{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DineQR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="{% static 'js/cart.js' %}" defer></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { padding-bottom: 80px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 relative min-h-screen">
    {% csrf_token %}

    <!-- Top Nav -->
    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a id="logo-link" href="{% url 'menu' %}" class="text-xl font-black text-gray-900 flex items-center gap-2">
                <div class="bg-orange-600 text-white p-1.5 rounded-lg">
                    <i data-lucide="utensils" class="w-5 h-5"></i>
                </div>
                <span>DineQR</span>
            </a>

            <div id="nav-table-badge" class="hidden bg-orange-50 border border-orange-100 text-orange-600 px-3 py-1 rounded-full text-sm font-bold shadow-sm">
                Table <span id="nav-table-num"></span>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </div>

    <!-- Global Toast Container -->
    <div id="toast-container" class="fixed bottom-24 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Mobile Bottom Navigation -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 z-50 pb-safe">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto px-2">

            <a id="nav-menu" href="{% url 'menu' %}" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-orange-600 transition-colors">
                <i data-lucide="book-open" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Menu</span>
            </a>

            <!-- Cart Link -->
            <a id="nav-cart" href="{% url 'cart_detail' %}" class="relative -top-5 bg-gray-900 text-white p-4 rounded-full shadow-xl shadow-gray-300 hover:bg-orange-600 transition-all hover:scale-105 transform">
                <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] font-black rounded-full h-6 w-6 flex items-center justify-center border-2 border-white shadow-sm transition-transform duration-200">
                    0
                </span>
            </a>

            <button onclick="openWaiterModal()" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-orange-600 transition-colors">
                <i data-lucide="bell-ring" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Waiter</span>
            </button>

        </div>
    </div>

    <!-- ========================================== -->
    <!-- WAITER CALL MODAL                          -->
    <!-- ========================================== -->
    <div id="waiter-modal" class="fixed inset-0 z-[70] hidden pointer-events-none">
        <div id="waiter-backdrop" onclick="closeWaiterModal()" class="absolute inset-0 bg-black/60 opacity-0 transition-opacity duration-300 pointer-events-auto"></div>

        <div id="waiter-content" class="absolute bottom-0 w-full bg-white rounded-t-[2.5rem] transform translate-y-full transition-transform duration-300 shadow-2xl overflow-hidden pointer-events-auto pb-safe">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-2xl font-black text-gray-900 leading-tight">Call Waiter</h2>
                        <p class="text-gray-500 text-sm font-medium mt-1">What do you need assistance with?</p>
                    </div>
                    <button onclick="closeWaiterModal()" class="p-2 bg-gray-100 rounded-full text-gray-600 hover:bg-gray-200 active:scale-95 transition-all">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button onclick="sendWaiterRequest('water')" class="bg-blue-50 border border-blue-100 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-blue-100 active:scale-95 transition-all group">
                        <div class="bg-white p-3 rounded-xl shadow-sm text-blue-500 group-hover:scale-110 transition-transform"><i data-lucide="droplets" class="w-6 h-6"></i></div>
                        <span class="font-bold text-blue-900 text-sm">Need Water</span>
                    </button>

                    <button onclick="sendWaiterRequest('clean')" class="bg-teal-50 border border-teal-100 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-teal-100 active:scale-95 transition-all group">
                        <div class="bg-white p-3 rounded-xl shadow-sm text-teal-500 group-hover:scale-110 transition-transform"><i data-lucide="sparkles" class="w-6 h-6"></i></div>
                        <span class="font-bold text-teal-900 text-sm">Clean Table</span>
                    </button>

                    <button onclick="sendWaiterRequest('bill')" class="bg-green-50 border border-green-100 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-green-100 active:scale-95 transition-all group">
                        <div class="bg-white p-3 rounded-xl shadow-sm text-green-500 group-hover:scale-110 transition-transform"><i data-lucide="receipt" class="w-6 h-6"></i></div>
                        <span class="font-bold text-green-900 text-sm">Bring Bill</span>
                    </button>

                    <button onclick="sendWaiterRequest('help')" class="bg-orange-50 border border-orange-100 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-orange-100 active:scale-95 transition-all group">
                        <div class="bg-white p-3 rounded-xl shadow-sm text-orange-500 group-hover:scale-110 transition-transform"><i data-lucide="message-square-plus" class="w-6 h-6"></i></div>
                        <span class="font-bold text-orange-900 text-sm">Other Help</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.addEventListener("DOMContentLoaded", () => {
            // 1. Get Table from URL or LocalStorage
            const params = new URLSearchParams(window.location.search);
            const table = params.get('table') || localStorage.getItem('dineqr_table');

            // 2. If we have a table, update the UI and Links
            if (table) {
                localStorage.setItem('dineqr_table', table);

                // Show Badge
                const badge = document.getElementById('nav-table-badge');
                const num = document.getElementById('nav-table-num');
                if (badge && num) {
                    badge.classList.remove('hidden');
                    num.innerText = table;
                }

                // Update URLs for Bottom Nav
                const appendTable = (id) => {
                    const el = document.getElementById(id);
                    if (el) {
                        const url = new URL(el.href, window.location.origin);
                        url.searchParams.set('table', table);
                        el.href = url.toString();
                    }
                }

                appendTable('nav-menu');
                appendTable('nav-cart');
                // We'll skip nav-waiter for now since it's just "#"
            }

            // 3. Logo Scroll-to-Top Logic
            const logo = document.getElementById('logo-link');
            if (logo) {
                logo.addEventListener('click', (e) => {
                    const currentPath = window.location.pathname;
                    // Check if we are already on the menu page
                    if (currentPath === '{% url "menu" %}' || currentPath === '/') {
                        e.preventDefault(); // Stop it from reloading the page
                        window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll up!
                    } else if (table) {
                        // If we are on the cart page, go back to menu WITH the table number
                        e.preventDefault();
                        window.location.href = `{% url 'menu' %}?table=${table}`;
                    }
                });
            }

        });
        // --- WAITER CALL LOGIC ---
        function openWaiterModal() {
            // Check if table is set
            const table = localStorage.getItem('dineqr_table');
            if (!table) {
                alert("Please scan a table QR code or enter a table number first!");
                return;
            }

            const modal = document.getElementById('waiter-modal');
            const backdrop = document.getElementById('waiter-backdrop');
            const content = document.getElementById('waiter-content');

            modal.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                content.classList.remove('translate-y-full');
            }, 10);
        }

        function closeWaiterModal() {
            const backdrop = document.getElementById('waiter-backdrop');
            const content = document.getElementById('waiter-content');

            backdrop.classList.add('opacity-0');
            content.classList.add('translate-y-full');

            setTimeout(() => {
                document.getElementById('waiter-modal').classList.add('hidden');
            }, 300);
        }

        async function sendWaiterRequest(reason) {
            const table = localStorage.getItem('dineqr_table');

            try {
                const response = await fetch('/api/call-waiter/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({ table_number: table, reason: reason })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    closeWaiterModal();
                    // Using your existing Toast function!
                    if (typeof showToast === "function") {
                        showToast("Waiter is on the way!");
                    } else {
                        alert("Waiter is on the way!");
                    }
                } else {
                    alert(data.message); // Will trigger the Anti-Spam message
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Network error. Please wave to a waiter.");
            }
        }
    </script>
</body>
</html>
