{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineQR</title>

    <!-- TAILWIND CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- LUCIDE ICONS CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- LINK TO CART.JS -->
    <script src="{% static 'js/cart.js' %}" defer></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-orange-600">DineQR</h1>

            <div class="relative">
                <!-- Shopping Cart Icon -->
                <i data-lucide="shopping-cart" class="w-6 h-6 text-gray-600"></i>
                <!-- Cart Count Badge -->
                <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">
                    0
                </span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
